# Per-checkout stack: watcher + mcp-server, joined to the shared code-rag-net.
# Driven by env: REPO_ROOT (mounted repo), COLLECTION (usually the folder name),
# MCP_PORT (published), COMPOSE_PROJECT_NAME (unique per checkout).
# Shared qdrant + reranker come from docker-compose.shared.yml (must be up first).

services:
  watcher:
    build: .
    command: ["uv", "run", "python", "-m", "app.watcher"]
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - QDRANT_URL=http://qdrant:6333
      - RERANKER_URL=http://reranker:80
      - COLLECTION=${COLLECTION}
      - HF_TOKEN=${HF_TOKEN:-}
      - STARTUP_JITTER_SEC=${STARTUP_JITTER_SEC:-0}
      - INCLUDE_EXT=${INCLUDE_EXT:-.py,.js,.jsx,.ts,.tsx,.go,.rs,.rb,.php,.java,.kt,.kts,.scala,.swift,.c,.h,.cpp,.hpp,.cs,.sh,.gradle,.md,.rst,.txt,.xml,.yaml,.yml,.toml,.json}
      - EXCLUDE_DIRS=${EXCLUDE_DIRS:-build,.git,.gradle,node_modules,.idea,dist,target,out,vendor,.venv,venv,__pycache__,.next,.mypy_cache,.pytest_cache}
      - EXCLUDE_FILES=${EXCLUDE_FILES:-lint-baseline.xml,package-lock.json,pnpm-lock.yaml,yarn.lock,go.sum,Cargo.lock,poetry.lock,composer.lock,.mcp.json}
      - RESPECT_GITIGNORE=${RESPECT_GITIGNORE:-true}
    extra_hosts: ["host.docker.internal:host-gateway"]
    volumes: ["${REPO_ROOT}:/repo:ro"]
    networks: [code-rag-net]
    restart: unless-stopped

  mcp-server:
    build: .
    command: ["uv", "run", "python", "-m", "app.mcp_server"]
    ports: ["${MCP_PORT}:8080"]
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - QDRANT_URL=http://qdrant:6333
      - RERANKER_URL=http://reranker:80
      - COLLECTION=${COLLECTION}
      - HF_TOKEN=${HF_TOKEN:-}
      - INCLUDE_EXT=${INCLUDE_EXT:-.py,.js,.jsx,.ts,.tsx,.go,.rs,.rb,.php,.java,.kt,.kts,.scala,.swift,.c,.h,.cpp,.hpp,.cs,.sh,.gradle,.md,.rst,.txt,.xml,.yaml,.yml,.toml,.json}
      - EXCLUDE_DIRS=${EXCLUDE_DIRS:-build,.git,.gradle,node_modules,.idea,dist,target,out,vendor,.venv,venv,__pycache__,.next,.mypy_cache,.pytest_cache}
      - EXCLUDE_FILES=${EXCLUDE_FILES:-lint-baseline.xml,package-lock.json,pnpm-lock.yaml,yarn.lock,go.sum,Cargo.lock,poetry.lock,composer.lock,.mcp.json}
      - RESPECT_GITIGNORE=${RESPECT_GITIGNORE:-true}
    extra_hosts: ["host.docker.internal:host-gateway"]
    volumes: ["${REPO_ROOT}:/repo:ro"]
    networks: [code-rag-net]
    restart: unless-stopped

networks:
  code-rag-net:
    external: true
    name: code-rag-net
